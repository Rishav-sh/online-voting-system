spring.application.name=voting-system

# Database Configuration
# Use PostgreSQL in production (Render), H2 in development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:votingdb}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
# Construct JDBC URL for Postgres if vars are present (will be overridden by env vars on Render)
# spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}

# Hibernate / JPA Configuration
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console Configuration (Only enabled if using H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Application JWT Secret (Put this in an env var in production)
voting.app.jwtSecret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
voting.app.jwtExpirationMs=86400000

# Server port (Provided by Render)
server.port=${PORT:8080}
