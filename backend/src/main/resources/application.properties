spring.application.name=voting-system

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:votingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate / JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console Configuration (For debugging during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Application JWT Secret (Put this in an env var in production)
voting.app.jwtSecret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
voting.app.jwtExpirationMs=86400000

# Server port
server.port=8080
